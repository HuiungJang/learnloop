name: ${AI_CODE_PROJECT_NAME:-ai-code-learning-platform}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DATABASE_NAME:-aicodelearning}
      POSTGRES_USER: ${APP_DATABASE_USERNAME:-aicodelearning}
      POSTGRES_PASSWORD: ${APP_DATABASE_PASSWORD:?APP_DATABASE_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DATABASE_USERNAME:-aicodelearning} -d ${APP_DATABASE_NAME:-aicodelearning}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - release-postgres-data:/var/lib/postgresql/data

  backend:
    image: ai-code-learning-platform-backend:${AI_CODE_RELEASE_VERSION:?AI_CODE_RELEASE_VERSION is required}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: install
      APP_DATABASE_URL: jdbc:postgresql://postgres:5432/${APP_DATABASE_NAME:-aicodelearning}
      APP_DATABASE_USERNAME: ${APP_DATABASE_USERNAME:-aicodelearning}
      APP_DATABASE_PASSWORD: ${APP_DATABASE_PASSWORD:?APP_DATABASE_PASSWORD is required}
      APP_DEMO_PASSWORD: ${APP_DEMO_PASSWORD:?APP_DEMO_PASSWORD is required}
      APP_OPENAPI_ENABLED: ${APP_OPENAPI_ENABLED:-true}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:${AI_CODE_WEB_PORT:-8080},http://127.0.0.1:${AI_CODE_WEB_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ai-code-learning-platform-web:${AI_CODE_RELEASE_VERSION:?AI_CODE_RELEASE_VERSION is required}
    restart: unless-stopped
    ports:
      - "${AI_CODE_WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  release-postgres-data:
