name: ${AI_CODE_PROJECT_NAME:-learnloop}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DATABASE_NAME:-learnloop}
      POSTGRES_USER: ${APP_DATABASE_USERNAME:-learnloop}
      POSTGRES_PASSWORD: ${APP_DATABASE_PASSWORD:?APP_DATABASE_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DATABASE_USERNAME:-learnloop} -d ${APP_DATABASE_NAME:-learnloop}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - release-postgres-data:/var/lib/postgresql/data

  backend:
    image: learnloop-backend:${AI_CODE_RELEASE_VERSION:?AI_CODE_RELEASE_VERSION is required}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: install
      APP_DATABASE_URL: jdbc:postgresql://postgres:5432/${APP_DATABASE_NAME:-learnloop}
      APP_DATABASE_USERNAME: ${APP_DATABASE_USERNAME:-learnloop}
      APP_DATABASE_PASSWORD: ${APP_DATABASE_PASSWORD:?APP_DATABASE_PASSWORD is required}
      APP_DEMO_PASSWORD: ${APP_DEMO_PASSWORD:?APP_DEMO_PASSWORD is required}
      APP_OPENAPI_ENABLED: ${APP_OPENAPI_ENABLED:-true}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:${AI_CODE_WEB_PORT:-8080},http://127.0.0.1:${AI_CODE_WEB_PORT:-8080}
      APP_RUNNER_ENABLED: ${APP_RUNNER_ENABLED:-true}
      APP_RUNNER_BASE_URL: ${APP_RUNNER_BASE_URL:-}
      APP_RUNNER_TOKEN: ${APP_RUNNER_TOKEN:-}
      APP_RUNNER_REQUIRE_LIMITS: ${APP_RUNNER_REQUIRE_LIMITS:-true}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: learnloop-web:${AI_CODE_RELEASE_VERSION:?AI_CODE_RELEASE_VERSION is required}
    restart: unless-stopped
    ports:
      - "${AI_CODE_WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  release-postgres-data:
