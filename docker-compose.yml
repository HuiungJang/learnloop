services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: learnloop
      POSTGRES_USER: learnloop
      POSTGRES_PASSWORD: learnloop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnloop -d learnloop"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - learnloop-postgres-data:/var/lib/postgresql/data

volumes:
  learnloop-postgres-data:
