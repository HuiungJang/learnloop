name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: ./scripts/npm.sh --prefix frontend ci

      - name: Run Node parity tests
        run: ./scripts/test.sh

      - name: Run backend tests
        run: ./scripts/backend-test.sh

      - name: Build frontend
        run: ./scripts/frontend-build.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version v$tag_version does not match package.json version $package_version" >&2
            exit 1
          fi

      - name: Build Docker images
        run: |
          cat > .ci.env <<'EOF'
          AI_CODE_WEB_PORT=8080
          APP_DATABASE_NAME=learnloop
          APP_DATABASE_USERNAME=learnloop
          APP_DATABASE_PASSWORD=release-build-only
          APP_DEMO_PASSWORD=release-build-only
          APP_OPENAPI_ENABLED=true
          EOF
          docker compose --env-file .ci.env -f docker-compose.install.yml build backend web

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: ./scripts/npm.sh --prefix frontend ci

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit frontend dependencies
        run: ./scripts/npm.sh --prefix frontend audit --audit-level=high

      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Build images for container scanning
        run: |
          cat > .ci.env <<'EOF'
          AI_CODE_WEB_PORT=8080
          APP_DATABASE_NAME=learnloop
          APP_DATABASE_USERNAME=learnloop
          APP_DATABASE_PASSWORD=release-scan-only
          APP_DEMO_PASSWORD=release-scan-only
          APP_OPENAPI_ENABLED=true
          EOF
          docker compose --env-file .ci.env -f docker-compose.install.yml build backend web

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: learnloop-backend:latest
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Scan web image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: learnloop-web:latest
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build release bundle
        run: ./scripts/package-release.sh

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: learnloop-release-bundle
          path: |
            dist/release/*

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: release
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: learnloop-release-bundle
          path: dist/release

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*

      - name: Report manual artifact location
        if: github.event_name == 'workflow_dispatch'
        run: echo "Release bundle is available as the learnloop-release-bundle workflow artifact."
