server:
  address: ${SERVER_ADDRESS:127.0.0.1}

spring:
  datasource:
    url: ${APP_DATABASE_URL:jdbc:postgresql://localhost:5432/learnloop}
    username: ${APP_DATABASE_USERNAME:learnloop}
    password: ${APP_DATABASE_PASSWORD:learnloop}
  flyway:
    clean-disabled: false

logging:
  level:
    com.aicodelearning: INFO

app:
  demo-password: ${APP_DEMO_PASSWORD:demo-password}
  registration:
    enabled: ${APP_REGISTRATION_ENABLED:false}
  seed-demo-roles: ${APP_SEED_DEMO_ROLES:false}
  local-owner:
    email: ${APP_LOCAL_OWNER_EMAIL:owner@local.learnloop}
    display-name: ${APP_LOCAL_OWNER_DISPLAY_NAME:Local Owner}
  provider-generation:
    credential-encryption-key: ${APP_CREDENTIAL_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    allow-loopback-base-url: ${APP_PROVIDER_ALLOW_LOOPBACK_BASE_URL:true}
