server:
  port: ${PORT:8080}

spring:
  application:
    name: learnloop
  datasource:
    url: ${APP_DATABASE_URL}
    username: ${APP_DATABASE_USERNAME}
    password: ${APP_DATABASE_PASSWORD}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${APP_OPENAPI_ENABLED:true}

app:
  session:
    ttl: PT8H
  login-rate-limit:
    max-attempts: 5
    window: PT1M
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
