server:
  port: ${PORT:8080}

spring:
  application:
    name: learnloop
  datasource:
    url: ${APP_DATABASE_URL}
    username: ${APP_DATABASE_USERNAME}
    password: ${APP_DATABASE_PASSWORD}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${APP_OPENAPI_ENABLED:true}

app:
  session:
    ttl: PT8H
  local-owner:
    enforce-session-owner: ${APP_LOCAL_OWNER_ENFORCE_SESSION_OWNER:true}
  login-rate-limit:
    max-attempts: 5
    window: PT1M
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  runner:
    enabled: ${APP_RUNNER_ENABLED:true}
    base-url: ${APP_RUNNER_BASE_URL:}
    token: ${APP_RUNNER_TOKEN:}
    docker-command: ${APP_RUNNER_DOCKER_COMMAND:docker}
    command-timeout: ${APP_RUNNER_COMMAND_TIMEOUT:PT2S}
    require-limits: ${APP_RUNNER_REQUIRE_LIMITS:true}
    workspace-container-root: ${APP_RUNNER_WORKSPACE_CONTAINER_ROOT:}
    workspace-host-root: ${APP_RUNNER_WORKSPACE_HOST_ROOT:}
  retention:
    cleanup:
      scheduler-enabled: ${APP_RETENTION_CLEANUP_SCHEDULER_ENABLED:true}
      schedule-interval-ms: ${APP_RETENTION_CLEANUP_SCHEDULE_INTERVAL_MS:86400000}
      check-interval-ms: ${APP_RETENTION_CLEANUP_CHECK_INTERVAL_MS:900000}
      tick-initial-delay-ms: ${APP_RETENTION_CLEANUP_TICK_INITIAL_DELAY_MS:300000}
      startup-jitter-ms: ${APP_RETENTION_CLEANUP_STARTUP_JITTER_MS:300000}
      recurring-jitter-ms: ${APP_RETENTION_CLEANUP_RECURRING_JITTER_MS:300000}
      batch-size: ${APP_RETENTION_CLEANUP_BATCH_SIZE:100}
  provider-generation:
    credential-encryption-key: ${APP_CREDENTIAL_ENCRYPTION_KEY:}
    allow-loopback-base-url: ${APP_PROVIDER_ALLOW_LOOPBACK_BASE_URL:false}
    connect-timeout: ${APP_PROVIDER_CONNECT_TIMEOUT:PT2S}
    request-timeout: ${APP_PROVIDER_REQUEST_TIMEOUT:PT15S}
    max-request-bytes: ${APP_PROVIDER_MAX_REQUEST_BYTES:65536}
    max-response-bytes: ${APP_PROVIDER_MAX_RESPONSE_BYTES:65536}
    max-output-tokens: ${APP_PROVIDER_MAX_OUTPUT_TOKENS:1024}
